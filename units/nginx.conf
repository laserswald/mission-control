user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;
include /etc/nginx/conf.d/*.conf;

events {
	worker_connections 768;
	# multi_accept on;
}

# Configuration for all HTTP-based servers.
http {
	sendfile on;
	tcp_nopush on;
	types_hash_max_size 2048;
	# server_tokens off;

	# server_names_hash_bucket_size 64;
	# server_name_in_redirect off;

	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	##
	# Logging Settings
	##

	access_log /var/log/nginx/access.log;

	##
	# Gzip Settings
	##

	gzip on;

	# gzip_vary on;
	# gzip_proxied any;
	# gzip_comp_level 6;
	# gzip_buffers 16 8k;
	# gzip_http_version 1.1;
	# gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

	#
	# Request limiting.
	#

	# Create the 'app' zone to limit requests to 10 per connected remote address
	limit_req_zone $binary_remote_addr zone=app:10m rate=10r/s;

	#
	# SSL and other settings.
	#

	ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
	ssl_prefer_server_ciphers on;

	# Listen on normal HTTP, but redirect everything to HTTPS.
	server {
	       listen 80 default_server;
	       location / {
	       		return 301 https://$host$request_uri;
	       }
	}

	#
	# Add any enabled site drop-in files.
	#
	include /etc/nginx/sites-enabled/*;
}
