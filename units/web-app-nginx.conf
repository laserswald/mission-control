#
# Web application NGINX drop-in file.
#

# Define a virtual server for our web app.
server {
       # Web apps always need to be behind TLS.
       listen 80;

       # Use HTTP/2 if possible.
       http2 on;

       # Web apps live in a subdomain of wherever I am hosting this.
       server_name ~|DOMAIN-NAME|;

       location / {
       		# Forward any traffic to the internally running web app
		proxy_pass http://localhost:~|PORT|/;

		# Set the headers so that the internal web app understands who actually sent it
		# (If I don't do this then it looks like everything is coming from localhost aka nginx)
		proxy_set_header Host              $host;
		proxy_set_header X-Real-IP         $remote_addr;
		proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;

		# Dealing with slow clients by buffering responses
		proxy_buffering on;
		proxy_buffers 8 16k;
		proxy_buffer_size 16k;

		# Limit the requests to this location
		limit_req zone=app burst=20 nodelay;
		limit_req_status 429;

		proxy_redirect http:// https://;
	}
}